<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>雨雲レーダーマップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f0f0f0;
      color: #1a1a2e;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
    }

    #map {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    #control-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 16px 20px;
      border-top: 1px solid rgba(0, 0, 0, 0.15);
      color: #1a1a2e;
    }

    #time-display {
      text-align: center;
      margin-bottom: 8px;
      font-size: 14px;
      min-height: 40px;
    }

    #time-absolute {
      color: #666;
      font-size: 12px;
      display: block;
    }

    #time-relative {
      font-size: 18px;
      font-weight: 700;
      display: block;
      margin-top: 2px;
    }

    .time-past { color: #0077cc; }
    .time-now { color: #00aa44; font-weight: 700; }
    .time-forecast { color: #cc6600; }

    #slider-container {
      position: relative;
      margin: 4px 0 10px;
    }

    #slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #00d4ff 0%, #ff8c00 100%);
      outline: none;
      cursor: pointer;
    }

    #slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #0077cc;
      border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      cursor: pointer;
    }

    #slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #0077cc;
      border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      cursor: pointer;
    }

    #now-marker {
      position: absolute;
      top: -4px;
      width: 2px;
      height: 14px;
      background: #00aa44;
      pointer-events: none;
      transform: translateX(-1px);
    }

    #controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .ctrl-btn {
      background: rgba(0, 119, 204, 0.1);
      border: 1px solid rgba(0, 119, 204, 0.4);
      color: #0077cc;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }

    .ctrl-btn:active {
      transform: scale(0.92);
      background: rgba(0, 119, 204, 0.25);
    }

    #legend {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #555;
    }

    .legend-color {
      width: 14px;
      height: 10px;
      border-radius: 2px;
    }

    .leaflet-control-attribution {
      background: rgba(255, 255, 255, 0.8) !important;
      color: #666 !important;
      font-size: 10px !important;
    }

    .leaflet-control-attribution a {
      color: #0077cc !important;
    }

    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2000;
      color: #333;
      font-size: 16px;
      background: rgba(255, 255, 255, 0.95);
      padding: 16px 28px;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    @media (max-width: 480px) {
      #control-panel {
        padding: 10px 12px 16px;
      }
      #time-relative {
        font-size: 16px;
      }
      .legend-item {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="loading">レーダーデータを読み込み中...</div>

  <div id="control-panel">
    <div id="forecast-badge" style="text-align:center;font-size:12px;color:#0077cc;margin-bottom:4px;">🌧 降水予測（最大60分先）</div>
    <div id="time-display">
      <span id="time-absolute"></span>
      <span id="time-relative"></span>
    </div>
    <div id="slider-container">
      <div id="now-marker"></div>
      <input type="range" id="slider" min="0" max="0" value="0">
    </div>
    <div id="controls">
      <button class="ctrl-btn" id="btn-play" title="再生/停止">&#9654;</button>
      <button class="ctrl-btn" id="btn-locate" title="現在地">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2" x2="12" y2="6"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="6" y2="12"/>
          <line x1="18" y1="12" x2="22" y2="12"/>
        </svg>
      </button>
    </div>
    <div id="legend">
      <div class="legend-item"><span class="legend-color" style="background:#72c7f0"></span>弱い雨</div>
      <div class="legend-item"><span class="legend-color" style="background:#30b24a"></span>小雨</div>
      <div class="legend-item"><span class="legend-color" style="background:#f0e641"></span>中雨</div>
      <div class="legend-item"><span class="legend-color" style="background:#f09a28"></span>強雨</div>
      <div class="legend-item"><span class="legend-color" style="background:#e02820"></span>激しい雨</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    (async function() {
      // --- Map setup ---
      const map = L.map('map', {
        center: [35.68, 139.69],
        zoom: 6,
        maxZoom: 14,
        minZoom: 3,
        zoomControl: true,
        attributionControl: true
      });

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19,
        maxNativeZoom: 19
      }).addTo(map);

      // --- State ---
      let frames = [];
      let currentFrameIndex = 0;
      let isPlaying = false;
      let playInterval = null;
      let radarLayers = {};
      let nowIndex = 0;
      let nowTime = 0;

      const slider = document.getElementById('slider');
      const timeAbsolute = document.getElementById('time-absolute');
      const timeRelative = document.getElementById('time-relative');
      const btnPlay = document.getElementById('btn-play');
      const btnLocate = document.getElementById('btn-locate');
      const nowMarker = document.getElementById('now-marker');
      const loading = document.getElementById('loading');

      // --- Fetch radar data ---
      async function loadRadarData() {
        try {
          const OWM_API_KEY = '5f0fa9efbb21dc0fc2aededf2481447a';

          // ① RainViewer 過去フレーム
          const res = await fetch('https://api.rainviewer.com/public/weather-maps.json');
          const data = await res.json();

          const pastFrames = data.radar.past.map(f => ({
            time: f.time,
            path: f.path,
            type: 'rainviewer',
            isForecast: false
          }));

          const nowcastFrames = (data.radar.nowcast || []).map(f => ({
            time: f.time,
            path: f.path,
            type: 'rainviewer',
            isForecast: true
          }));

          // ② OWM 予測フレーム（nowcastがない場合のみ追加、+10〜+60分）
          let owmFrames = [];
          if (nowcastFrames.length === 0) {
            const now = Date.now();
            for (let m = 10; m <= 60; m += 10) {
              owmFrames.push({
                time: Math.floor((now + m * 60 * 1000) / 1000),
                type: 'owm',
                isForecast: true,
                owmKey: OWM_API_KEY
              });
            }
          }

          frames = [...pastFrames, ...nowcastFrames, ...owmFrames];
          nowTime = Math.floor(Date.now() / 1000);

          console.log('past:', pastFrames.length, '/ nowcast:', nowcastFrames.length, '/ owm:', owmFrames.length);

          // バッジ更新
          const badge = document.getElementById('forecast-badge');
          if (badge) {
            if (nowcastFrames.length > 0) {
              badge.textContent = `🌧 過去2時間 ＋ ${nowcastFrames.length * 10}分予測`;
            } else if (owmFrames.length > 0) {
              badge.textContent = '🌧 過去2時間 ＋ 60分予測（OWM）';
            } else {
              badge.textContent = '🌧 降水レーダー（過去2時間）';
            }
          }

          // スライダー・初期フレーム（現在）
          const initIndex = pastFrames.length - 1;
          nowIndex = initIndex < 0 ? 0 : initIndex;

          slider.max = frames.length - 1;
          slider.value = nowIndex;
          currentFrameIndex = nowIndex;

          updateNowMarker();
          showFrame(currentFrameIndex);
          loading.style.display = 'none';
        } catch (err) {
          console.error('データ取得エラー:', err);
          loading.textContent = 'データ取得に失敗しました';
        }
      }

      function updateNowMarker() {
        if (frames.length === 0) return;
        const pct = (nowIndex / (frames.length - 1)) * 100;
        nowMarker.style.left = `calc(${pct}% + ${(0.5 - pct / 100) * 12}px)`;
      }

      // --- Frame rendering ---
      function showFrame(index) {
        if (!frames[index]) return;

        Object.values(radarLayers).forEach(layer => {
          if (map.hasLayer(layer)) map.removeLayer(layer);
        });

        const frame = frames[index];

        if (!radarLayers[index]) {
          let tileUrl;

          if (frame.type === 'owm') {
            tileUrl = `https://tile.openweathermap.org/map/precipitation_new/{z}/{x}/{y}.png?appid=${frame.owmKey}`;
            radarLayers[index] = L.tileLayer(tileUrl, {
              opacity: 0.5,
              maxZoom: 18,
              maxNativeZoom: 8,
              tileSize: 256,
              zIndex: 10
            });
          } else {
            tileUrl = `https://tilecache.rainviewer.com${frame.path}/256/{z}/{x}/{y}/2/1_1.png`;
            radarLayers[index] = L.tileLayer(tileUrl, {
              opacity: frame.isForecast ? 0.5 : 0.7,
              maxZoom: 18,
              maxNativeZoom: 6,
              tileSize: 256,
              zIndex: 10
            });
          }
        }

        radarLayers[index].addTo(map);

        currentFrameIndex = index;
        slider.value = index;

        updateTimeDisplay(frame.time);
      }

      function updateTimeDisplay(unixTime) {
        const date = new Date(unixTime * 1000);
        const h = date.getHours().toString().padStart(2, '0');
        const m = date.getMinutes().toString().padStart(2, '0');
        timeAbsolute.textContent = `${date.getMonth() + 1}/${date.getDate()} ${h}:${m}`;

        const diffMinRaw = (unixTime - nowTime) / 60;
        const diffMin = Math.round(diffMinRaw / 10) * 10;

        timeRelative.className = '';
        if (diffMin === 0) {
          timeRelative.textContent = '🔵 現在';
          timeRelative.classList.add('time-now');
        } else if (diffMin > 0) {
          timeRelative.textContent = `🟠 +${diffMin}分後 (予測)`;
          timeRelative.classList.add('time-forecast');
        } else {
          timeRelative.textContent = `⚪ ${diffMin}分前`;
          timeRelative.classList.add('time-past');
        }
      }

      // --- Playback ---
      function updateSlider() {
        if (slider) slider.value = currentFrameIndex;
      }

      function togglePlay() {
        if (isPlaying) {
          clearInterval(playInterval);
          playInterval = null;
          isPlaying = false;
          btnPlay.innerHTML = '▶';
          return;
        }

        isPlaying = true;
        btnPlay.innerHTML = '⏸';

        // 先頭（最古フレーム）からスタート
        currentFrameIndex = 0;
        showFrame(currentFrameIndex);
        updateSlider();

        playInterval = setInterval(() => {
          currentFrameIndex++;

          if (currentFrameIndex >= frames.length) {
            // 最後まで再生したら止まる
            currentFrameIndex = frames.length - 1;
            clearInterval(playInterval);
            playInterval = null;
            isPlaying = false;
            btnPlay.innerHTML = '▶';
            return;
          }

          showFrame(currentFrameIndex);
          updateSlider();
        }, 600);
      }

      // --- Events ---
      btnPlay.addEventListener('click', togglePlay);

      slider.addEventListener('input', () => {
        if (isPlaying) {
          clearInterval(playInterval);
          playInterval = null;
          isPlaying = false;
          btnPlay.innerHTML = '▶';
        }
        showFrame(parseInt(slider.value));
      });

      btnLocate.addEventListener('click', () => {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 10);
          },
          () => {
            // Geolocation denied or unavailable — silently ignore
          }
        );
      });

      // Resize handling
      window.addEventListener('resize', () => {
        map.invalidateSize();
        updateNowMarker();
      });

      // --- Init ---
      await loadRadarData();

      // Auto-refresh every 5 minutes
      setInterval(async () => {
        // Clean up old layers
        for (const key in radarLayers) {
          if (radarLayers[key]._map) {
            map.removeLayer(radarLayers[key]);
          }
        }
        radarLayers = {};
        await loadRadarData();
      }, 5 * 60 * 1000);
    })();
  </script>
</body>
</html>
